<!DOCTYPE html>
<html>
<head>
    <title>Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Welcome to My Landing Page</h1>

    <p>
        This is my first full-stack project using HTML, CSS and Spring Boot.
    </p>

    <div class="form-box">

        <h2>Contact Us</h2>

        <form action="/submit" method="post">

            <input type="text"
                   name="name"
                   placeholder="Enter Name"
                   required>

            <input type="email"
                   name="email"
                   placeholder="Enter Email"
                   required>

            <textarea
                    name="message"
                    placeholder="Enter Message"
                    rows="5"
                    required></textarea>

            <button type="submit">
                Submit
            </button>

        </form>

    </div>

</div>

</body>
</html>
